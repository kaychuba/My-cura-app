packages:
  - 'apps/*'
  - 'packages/*'
  - 'infrastructure/cdk'

# Hoisted layout: required for Expo/React Native (EAS prebuild resolves
# @react-native/gradle-plugin with plain node resolution, which the isolated
# symlink layout breaks).
nodeLinker: hoisted

allowBuilds:
  argon2: true
  '@nestjs/core': true
  '@parcel/watcher': true
  '@swc/core': true
  bcrypt: true
  canvas: true
  dtrace-provider: false
  esbuild: true
  less: true
  msgpackr-extract: true
  nx: true
  protobufjs: true
  puppeteer: true
  unrs-resolver: true
