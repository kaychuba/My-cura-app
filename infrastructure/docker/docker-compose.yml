version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mycura-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mycura
      POSTGRES_PASSWORD: mycura
      POSTGRES_DB: mycura
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U mycura']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mycura-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  opensearch:
    image: opensearchproject/opensearch:2.14.0
    container_name: mycura-opensearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - '9200:9200'
      - '9600:9600'
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -s http://localhost:9200/_cluster/health | grep -q "status"']
      interval: 30s
      timeout: 10s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mycura-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'

  stripe-mock:
    image: stripe/stripe-mock:latest
    container_name: mycura-stripe-mock
    restart: unless-stopped
    ports:
      - '12111:12111'

volumes:
  postgres_data:
  redis_data:
  opensearch_data:

networks:
  default:
    name: mycura-dev
