# Cloud-agnostic deployment: runs My-Cura on ANY host with Docker —
# a VPS, Hetzner, DigitalOcean, Azure, GCP, on-premise, or AWS.
# The CDK stack under infrastructure/ is one OPTION, not a requirement.
#
#   cp apps/api/.env.example .env    # fill in real secrets
#   docker compose up -d
#
# Nothing in this file contains a credential; everything comes from .env.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:?set in .env}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set in .env}
      POSTGRES_DB: ${DB_NAME:-mycura}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-mycura}
      DB_USERNAME: ${DB_USERNAME:?}
      DB_PASSWORD: ${DB_PASSWORD:?}
      DB_APP_USERNAME: ${DB_APP_USERNAME:-mycura_app}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD:?}
      DB_AUTH_USERNAME: ${DB_AUTH_USERNAME:-mycura_auth}
      DB_AUTH_PASSWORD: ${DB_AUTH_PASSWORD:?}
      JWT_SECRET: ${JWT_SECRET:?}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?}
      ENCRYPTION_KEY_VERSION: ${ENCRYPTION_KEY_VERSION:-1}
      ENCRYPTION_KEYS_RETIRED: ${ENCRYPTION_KEYS_RETIRED:-}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3001}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
      CLAMAV_HOST: ${CLAMAV_HOST:-clamav}
    ports:
      - "3000:3000"

  # Virus scanning for staff file uploads (upload-guard.util.ts streams every
  # accepted file here before it is stored).
  clamav:
    image: clamav/clamav:stable
    restart: unless-stopped
    volumes:
      - clamdb:/var/lib/clamav

  # Nightly dumps, AES-256 encrypted with BACKUP_ENCRYPTION_KEY, 30-day
  # retention, and a webhook alert if a dump fails: redundancy that exists
  # even before a managed replica is configured.
  # Restore: openssl enc -d -aes-256-cbc -pbkdf2 -pass env:BACKUP_ENCRYPTION_KEY \
  #            -in mycura-<date>.dump.enc | pg_restore -d mycura
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGUSER: ${DB_USERNAME:?}
      PGPASSWORD: ${DB_PASSWORD:?}
      PGDATABASE: ${DB_NAME:-mycura}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:?}
      ALERT_WEBHOOK_URL: ${ALERT_WEBHOOK_URL:-}
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c 'while true; do
        if pg_dump -Fc |
           openssl enc -aes-256-cbc -pbkdf2 -pass env:BACKUP_ENCRYPTION_KEY
             -out "/backups/mycura-$$(date +%Y%m%d-%H%M).dump.enc"; then
          find /backups -name "*.dump.enc" -mtime +30 -delete;
        else
          echo "BACKUP FAILED at $$(date -u)" >&2;
          [ -n "$$ALERT_WEBHOOK_URL" ] &&
            wget -q -O- --header="Content-Type: application/json"
              --post-data="{\"text\":\"🚨 My-Cura database backup FAILED at $$(date -u)\"}"
              "$$ALERT_WEBHOOK_URL" || true;
        fi;
        sleep 86400;
      done'

volumes:
  pgdata:
  redisdata:
  clamdb:
